<!DOCTYPE html>
<html>
    <head>
        <title>JS Practice</title>
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    </head>
    <body class="flex justify-center items-center h-screen 
            bg-linear-to-br from-blue-500 to-purple-500">
            
        <main class="bg-white/95 p-4 rounded-lg shadow-2xl shadow-black w-1/2">
            <div>
                <h1 class="font-bold text-4xl mb-1">Clicker Game</h1>
                <p class="mb-3 font-light text-2xl">Click to gain score</p>
            </div>

            <p class="font-semibold mb-5 text-xl">Score <span id="score">0</span></p>

            <section class="flex flex-col gap-3">
                <button class="border p-4 w-full mr-4 rounded-lg active:scale-95
                        cursor-pointer transition hover:bg-gray-200" id="increase"
                        >Increase</button>

                <button class="border p-4 w-full mr-4 rounded-lg active:scale-95 
                        cursor-pointer transition hover:bg-gray-200" id="decrease"
                        >Decrease</button>

                <button class="border p-4 w-full mr-4 rounded-lg active:scale-95
                         cursor-pointer transition hover:bg-gray-200" id="reset"
                         >Reset</button>

                 <button class="border p-4 w-full mr-4 rounded-lg active:scale-95 
                        cursor-pointer transition hover:bg-gray-200" id="upgradebtn"
                        >Upgrade</button>
            </section>
            <p class="flex justify-center" id="temptext"></p>
            <hr class="m-3">
            <h1 class="font-semibold text-xl">Statistics:</h1>
            <br>

            <div class="flex items-start w-full">
                <p class="font-semibold" id="clicks">Clicks: 0</p>
            </div>

            <div class="flex items-start w-full">
                <p class="font-semibold" id="amountofupgrades">Amount of upgrades: 0</p>
            </div>

            <div>
                <p class="font-semibold" id="highscore">Highest score: 0</p>
            </div>
        </main>
        <script src="script.js"></script>
    </body>
</html>
