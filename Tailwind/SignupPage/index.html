<!DOCTYPE html>
<html>
    <head>
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    </head>
    <body class="h-screen flex-col flex justify-center items-center overflow-hidden">
        <main class="shadow-2xl flex
                    flex-col p-10 h-screen
                    absolute w-120">
            <h1 class="font-bold text-xl mt-2">Welcome</h1>
            <p>Make an account to get started</p>

            <div class="flex flex-col mt-2">
                <label for="email">Email</label>
                <input class="border rounded-lg p-4 placeholder:text-black
                            hover:scale-95 transition focus:scale-105 " 
                            type="text" placeholder="email@example.com">
            </div>

            <div class="flex flex-col gap-2 mt-2">
                <label for="username">Username</label>
                <input class="border rounded-lg p-4 placeholder:text-black
                            hover:scale-95 transition focus:scale-105"
                            type="text" placeholder="Johndoe0">
            </div>

            <div class="flex flex-col gap-2 mt-2">
            <lable for="password">Password</lable>
                <input class="border rounded-lg p-4 placeholder:text-black
                            hover:scale-95 transition focus:scale-105"
                            type="password" placeholder="password">
            </div>

            <div class="flex flex-col gap-2 mt-2">
                <label for="con-password">Confirm Password</label>
                <input class="border rounded-lg p-4 placeholder:text-black
                            hover:scale-95 transition focus:scale-105"
                            type="text" placeholder="password"">
            </div>
            <br>
            <label>
                <input class="cursor-pointer" type="checkbox">
                I have read the <span class="font-semibold">Terms and Conditons</span>
            </label>
            <label>
                <input class="cursor-pointer" type="checkbox">
                I am atleast <span class="font-semibold">18 years old</span>
            </label>
            <button class="text-white border bg-blue-600 p-3 cursor-pointer
                        hover:scale-95 active:scale-105 mb-2 mt-2"
                        >Sign up</button>
            <hr>
            <div class="flex flex-col mt-2">
                <button class="flex items-center border rounded-lg
                            hover:scale-95 active:scale-105 h-14 justify-center
                            hover:bg-blue-200">
                    <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAOEAAADhCAMAAAAJbSJIAAAAdVBMVEX////yUCKAugECpO//uQIAoO7/tgCdyVLySxnxRAP6vrLO46x5twCs2/j/46wAou/1e2D/yFNSuPL0dVf7y8HY6byZx0i84vr/6LxItfL/xkj3moWz1XryRg3xNwByswD9497q89vb8Pz/89sAm+56yPX/1Ho9Y5PxAAABIElEQVR4nO3PV2pCURRAUaN51mfvJbE7/yEKF/ObjyM5EFh7ABtWoyFJkiRJkiRJkiRJkiRJkiTpt/aTcPNFOSxXnXCHBOHkqxut1y+HQd2MVncyhN2PaO8Lm4SEhISEhISEhISEhISEhISEhISEhISEhISEhISEhISEhISEhISEhISEhISEhISEhIT5wnkv3PdLeKzDrRKEi368UzmcB/GWCUJJ+vvWw3iXcriO4m0ShNsq3G1YDqN2vF2CcDZuRat+hJ/hpoSEhISEhISEhISEhISEhISEhISEhISEhISEhISEhISEhISEhISEhISEhISEhISEhIT5wmoc7X1hO0N4n4Xbrsths5uGeyQIJUmSJEmSJEmSJEmSJEmSpP/cE/HHzch3GAMiAAAAAElFTkSuQmCC" width="30">
                    Sign up with Mircosoft
                </button>
            </div>

            <div class="flex flex-col mt-2">
                <button class="flex items-center border rounded-lg
                            hover:scale-95 active:scale-105 h-14 justify-center
                            hover:bg-blue-200">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c1/Google_%22G%22_logo.svg/3840px-Google_%22G%22_logo.svg.png" width="30">
                    Sign up with Google
                </button>
            </div>

            <div class="flex flex-col mt-2">
                <button class="flex items-center border rounded-lg
                            hover:scale-95 active:scale-105 h-14 justify-center
                            hover:bg-blue-200">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/9/91/Octicons-mark-github.svg" width="30">
                    Sign up with Github
                </button>
            </div>

        </main>
    </body>
</html>
